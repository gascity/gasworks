# SECURITY (pull_request_target): this workflow runs with a read/write token in the BASE
# repo context and is triggered by untrusted PRs. To stay safe it MUST NOT:
#   - `actions/checkout` the PR HEAD (or any untrusted ref) — that would run fork code under
#     this privileged token. It checks out nothing; it only calls the labels API.
#   - interpolate untrusted `${{ github.event.* }}` (PR title/body/branch/comment text) into a
#     `run:` shell or a `script:` body — pass such values via env/inputs and read them as data.
# Keep it to the fixed-label github-script call below; do not add a checkout step.
name: Auto-label new issues and PRs

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  add-triage-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Add needs-triage label
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const number = context.issue?.number || context.payload.pull_request?.number;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              labels: ['status/needs-triage']
            });
