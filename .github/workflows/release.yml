# Signed release pipeline for the gasworks Go binaries.
#
# GATED: this workflow only fires on a pushed `v*` tag (e.g. `git tag v1.2.3 && git push
# --tags`). Until such a tag is pushed it never runs — merging to main does NOT release.
#
# It builds both binaries, checksums them, KEYLESS-signs (cosign + Fulcio/Rekor), produces
# SBOMs, and publishes to the PUBLIC gascity/gasworks GitHub Releases, then pushes the
# Homebrew formula to gascity/homebrew-tap.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload assets
  id-token: write # OIDC token for cosign KEYLESS signing (Fulcio) — the load-bearing perm

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # The base64-encoded sha256 subjects of the released artifacts, consumed by the SLSA
    # provenance job below. Produced by the `hash` step from GoReleaser's artifacts.json.
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog/version

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          # Pinned to 1.26.4 — REQUIRED by the go.mod floor `go 1.26.4` (set by the
          # gastownhall/gascity/pkg/eventexport pin). It builds the stdlib baked into the
          # released binaries; 1.26.4 is govulncheck-clean (also clears the 1.24.x CVEs).
          go-version: "1.26.4"

      # Verify the vendored/module dependencies match their go.sum hashes before building the
      # released binaries — a tripwire against a tampered module cache or vendor tree feeding
      # the supply chain we then sign.
      - name: Verify module integrity
        run: go mod verify

      # syft provides the SBOMs referenced by `sboms:` in .goreleaser.yaml.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      # cosign provides keyless sign-blob. The OIDC identity it uses is exactly what the
      # consumer verify command pins (certificate-identity-regexp + oidc-issuer).
      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          # GITHUB_TOKEN publishes the Release in THIS repo. GASWORKS_RELEASE_TOKEN is the
          # org secret with push access to the cross-repo Homebrew tap (gascity/homebrew-tap)
          # — GITHUB_TOKEN cannot push cross-repo, so the tap step needs the org token.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GASWORKS_RELEASE_TOKEN: ${{ secrets.GASWORKS_RELEASE_TOKEN }}

      # Standard goreleaser->SLSA bridge. goreleaser-action v6 exposes `artifacts`/`metadata`
      # but NOT a ready-made `hashes` output, so we compute the base64 sha256 subjects here
      # from dist/artifacts.json (the released archives + checksums.txt). This is the exact
      # recipe the slsa-github-generator docs prescribe for GoReleaser.
      - name: Generate provenance subjects
        id: hash
        env:
          ARTIFACTS: "${{ steps.goreleaser.outputs.artifacts }}"
        run: |
          set -euo pipefail
          # Select the release artifacts to attest: the published archives plus the signed
          # checksums.txt (root of the checksum trust chain). jq reads the paths goreleaser
          # recorded, sha256sum's them, and we base64-encode the multi-line digest list.
          hashes="$(
            jq -r '.[] | select(.type=="Archive" or .name=="checksums.txt") | .path' dist/artifacts.json \
              | xargs -r sha256sum \
              | base64 -w0
          )"
          echo "hashes=${hashes}" >> "$GITHUB_OUTPUT"

  # SLSA provenance (authoritative). DECISION: produce the SLSA Build L3 provenance via the
  # audited slsa-github-generator rather than a hand-rolled goreleaser hook. This is the
  # clearly-marked hook referenced in .goreleaser.yaml's `metadata` block. It runs after
  # goreleaser, hashing the released artifacts (via the `hashes` output above) and emitting a
  # provenance attestation tied to the same OIDC identity that cosign used, so the whole
  # bundle (binary + .sig/.pem + SBOM + provenance) traces to one build.
  #
  # ARMED but UNPROVEN: this job is wired and will run on the next pushed `v*` tag. It cannot
  # be exercised here — it needs the real release (the out-of-band GASWORKS_RELEASE_TOKEN/tap
  # and a live OIDC token), so end-to-end attestation verification is a gated first-release
  # follow-up. `goreleaser check` + the snapshot dry-run validate everything up to signing.
  provenance:
    needs: [goreleaser]
    permissions:
      actions: read # read the workflow run metadata the generator attests over
      id-token: write # OIDC token for the keyless provenance signature (same identity as cosign)
      contents: write # upload the .intoto.jsonl provenance to the GitHub Release
    # PINNED BY TAG ON PURPOSE — the slsa-github-generator is the DOCUMENTED EXCEPTION to the
    # SHA-pinning rule: slsa-verifier matches the trusted builder by its TAG ref
    # (…/generator_generic_slsa3.yml@refs/tags/vX.Y.Z), so a commit-SHA pin makes the emitted
    # provenance UNVERIFIABLE. Audit the tag's commit out-of-band when bumping.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.goreleaser.outputs.hashes }}"
      upload-assets: true
